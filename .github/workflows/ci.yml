name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust and the wasm target
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup target add wasm32v1-none

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      # The factory embeds the circle's spec via `contractimport!`, so the
      # circle wasm must exist before the factory compiles. `make` encodes the
      # ordering and falls back to cargo when the Stellar CLI is absent.
      - name: Build contracts
        run: make build

      - name: Test
        run: cargo test --locked

      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contracts-wasm
          path: target/wasm32v1-none/release/*.wasm
